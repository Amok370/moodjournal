name: mood_journal
description: "MoodJournal - Duygusal Sağlık Takip Uygulaması. Psikiyatrik rahatsızlıkları olan bireyler için mobil günlük."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Database
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1

  # Charts
  fl_chart: ^0.70.2

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.4

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Date & Time
  intl: ^0.20.2

  # Share
  share_plus: ^10.1.4

  # Google Fonts
  google_fonts: ^6.2.1
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
